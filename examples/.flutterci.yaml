# .flutterci.yaml — drop this in the ROOT of each Flutter project.
#
# Holds the project's IDENTITY and CREDENTIAL paths (the stable, project-owned
# values). VOLATILE run parameters — branch, flavor, distribution — are passed
# by Jenkins and override anything set here.
#
# Precedence:  Jenkins param (CLI flag)  >  env var  >  this file  >  default
#
# Credential paths are relative to the project root (or absolute).

app:
  name: "MPM Transporter Unit"
  package: id.qtrust.mpm_transporter_unit   # Android applicationId / iOS bundle id

# Optional defaults (Jenkins normally overrides these):
# platform: android
# distribution: firebase
# flavor: production

# Per-flavor .env values (OPTIONAL). Only needed for apps that read config at
# RUNTIME via flutter_dotenv AND keep .env gitignored. flutterci materializes
# `.flavors.<flavor>.dotenv` into the project's .env before the build (generic
# over keys). Apps that read env at compile time (String.fromEnvironment) or
# commit their own .env do NOT need this block — flutterci always also passes
# `--dart-define=ENV=<flavor>`.
#
# Put ONLY non-secret values here. Secrets (api keys, passwords) are injected by
# flutterci from Jenkins credential env vars (e.g. KIOSK_SOCKET_API_KEY,
# BASIC_PASSWORD) and must never be committed. LAST_UPDATE is added automatically.
#
# flavors:
#   staging:
#     dotenv:
#       ENV: staging
#       APP_ENV: Staging
#       ENDPOINT: https://staging.example.qtrust.id
#   production:
#     dotenv:
#       ENV: production
#       APP_ENV: Production
#       ENDPOINT: https://prod.example.qtrust.id

flutter:
  use_fvm: true            # omit to auto-detect a .fvm directory
  version: "3.35.7"        # when use_fvm: true, flutterci runs `fvm install/use`
                           # this version (no separate fvm pre-step needed)

android:
  # Optional: pin the Android SDK location when the agent doesn't export
  # ANDROID_HOME and auto-detection can't find it. Env ANDROID_HOME still wins.
  # (This agent exports ANDROID_SDK_PATH, which is auto-detected.)
  # sdk_dir: /home/jenkins/android-sdk

  # JDK for Gradle. Old Gradle wrappers (7.x) need Java <= 19, but agents often
  # default to Java 21. Set java_version to auto-locate a matching JDK, or
  # java_home for an explicit path.
  java_version: "17"
  # java_home: /usr/lib/jvm/java-17-openjdk-amd64

  firebase:
    # Either a single id...
    app_id: "1:433175643695:android:6c5834c5e9446a6c61e8da"
    # ...or per-flavor ids (takes priority when --flavor matches a key):
    app_ids:
      default:    "1:433175643695:android:6c5834c5e9446a6c61e8da"
      # production: "1:433175643695:android:xxxxxxxxxxxxxxxxxxxxxx"
      # staging:    "1:433175643695:android:yyyyyyyyyyyyyyyyyyyyyy"
    groups: "qa-team"
    credentials: scripts/qtrust-venturo-firebase-adminsdk-fbsvc-576f9fc55f.json

  playstore:
    package: id.qtrust.mpm_transporter_unit
    credentials: scripts/play-store-service-account.json
    track: internal        # internal | alpha | beta | production
    status: draft          # draft | completed | inProgress

ios:
  appstore:
    api_key_id: "ABC123DEF4"
    api_issuer_id: "11111111-2222-3333-4444-555555555555"
    api_key_path: ios/private_keys/AuthKey_ABC123DEF4.p8
    fastlane_lane: deploy  # used only if no API key is available

notify:
  discord:
    webhook_url: "https://discord.com/api/webhooks/1458369535584239702/vcHSybtgvGiiD9mGKZ5pXOYCJboKC8eFz-4kxhX_s9qIr3L12eLEkZ5ow_BtN-EFN6Jy"
    thread_id: "1275274683779911680"
